<script>
// ═══════════════════════════════════════════════════════
//  CORE STATE
// ═══════════════════════════════════════════════════════
let gToken=null, locations=[], engineRunning=false, engineStop=false;
let optimizerRunning=false, optimizerStop=false;
let mediaLibrary=[]; // {id, name, type, dataUrl, bytes, mimeType, caption, selected}
let selectedPostType='PHOTO';
let selectedOptKeys=new Set(['description','posts','qa','services']);
let todayData={date:todayStr(),replied:0,negative:0,photosPosted:0,postsCreated:0,optimized:0,locationsDone:[],log:[]};
let intelligence={};

const cfg={
  get client(){return ls('gmb_c')||'';},
  get claude(){return ls('gmb_k')||'';},
  get tone(){return ls('gmb_t')||'professional';},
  get delay(){return parseInt(ls('gmb_d')||'4')*1000;},
  get throttle(){return parseInt(ls('gmb_th')||'1200');},
  get rtime(){return ls('gmb_rt')||'20:00';},
};

function ls(k,v){if(v!==undefined)localStorage.setItem(k,v);return localStorage.getItem(k);} 
function todayStr(){return new Date().toISOString().slice(0,10);} 

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
window.onload=()=>{
  document.getElementById('origin-label').textContent=window.location.origin;
  try{const raw=ls('gmb_today');if(raw){const d=JSON.parse(raw);if(d.date===todayStr())todayData=d;}}catch(e){}
  try{const raw=ls('gmb_intel');if(raw)intelligence=JSON.parse(raw);}catch(e){}
  loadCfgUI(); updateStats(); startReportScheduler();
  if(cfg.client&&cfg.claude) doConnect();
};

function loadCfgUI(){
  document.getElementById('cfg-client').value=cfg.client;
  document.getElementById('cfg-claude').value=cfg.claude;
  document.getElementById('cfg-delay').value=parseInt(cfg.delay/1000)||4;
  document.getElementById('cfg-rtime').value=cfg.rtime;
  const th=document.getElementById('cfg-throttle');if(th)th.value=cfg.throttle||1200;
  document.querySelectorAll('.tone-chip').forEach(c=>{
    c.classList.toggle('sel',c.textContent.toLowerCase().startsWith(cfg.tone));
  });
}
function selTone(el,v){document.querySelectorAll('.tone-chip').forEach(c=>c.classList.remove('sel'));el.classList.add('sel');ls('gmb_t',v);} 

function showView(name,navEl){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(navEl)navEl.classList.add('active');
  if(name==='intelligence')renderIntelligence();
  if(name==='report')refreshReportTimer();
  if(name==='studio')renderStudioLocList();
}

// ═══════════════════════════════════════════════════════
//  GOOGLE OAUTH
// ═══════════════════════════════════════════════════════
function doConnect(){
  const cid=document.getElementById('cfg-client').value.trim();
  const ck=document.getElementById('cfg-claude').value.trim();
  if(!cid){toast('Enter your Google OAuth Client ID','err');return;}
  if(!ck){toast('Enter your Anthropic API Key','err');return;}
  ls('gmb_c',cid);ls('gmb_k',ck);
  ls('gmb_d',document.getElementById('cfg-delay').value);
  ls('gmb_rt',document.getElementById('cfg-rtime').value);
  const th=document.getElementById('cfg-throttle');if(th)ls('gmb_th',th.value);
  try{
    google.accounts.oauth2.initTokenClient({
      client_id:cid,
      scope:'https://www.googleapis.com/auth/business.manage',
      callback:async(r)=>{
        if(r.error){toast('OAuth error: '+r.error,'err');return;}
        gToken=r.access_token;
        onAuthed();
      }
    }).requestAccessToken();
  }catch(e){toast('OAuth failed. Check Client ID & origin.','err');}
}

async function onAuthed(){
  document.getElementById('conn-pill').className='pill on';
  document.getElementById('conn-pill').innerHTML='<div class="pill-dot"></div>Connected';
  document.getElementById('signout-btn').style.display='';
  document.getElementById('sched-pill').style.display='';
  document.getElementById('nav-bar').style.display='';
  showView('engine',document.querySelector('.nav-btn'));
  log('Connected to Google','info');
  await loadLocations();
}

function signOut(){
  gToken=null;locations=[];
  document.getElementById('conn-pill').className='pill';
  document.getElementById('conn-pill').innerHTML='<div class="pill-dot"></div>Not connected';
  document.getElementById('signout-btn').style.display='none';
  document.getElementById('sched-pill').style.display='none';
  document.getElementById('nav-bar').style.display='none';
  showView('setup');
}

// ═══════════════════════════════════════════════════════
//  GMB API — with exponential backoff + retry on 429
// ═══════════════════════════════════════════════════════

// Global request throttle — max 1 GMB request per THROTTLE_MS
// THROTTLE_MS is dynamic — read from config each call
const THROTTLE_MS_DEFAULT = 1200;
function getThrottle(){ return parseInt(ls('gmb_th')||String(THROTTLE_MS_DEFAULT)); }
let _lastGmbCall = 0;

async function throttledFetch(url, opts={}, attempt=0){
  // Enforce minimum gap between calls
  const now = Date.now();
  const gap = now - _lastGmbCall;
  if(gap < getThrottle()) await sleep(getThrottle() - gap);
  _lastGmbCall = Date.now();

  const r = await fetch(url, {
    ...opts,
    headers:{
      'Authorization':'Bearer '+gToken,
      'Content-Type':'application/json',
      ...(opts.headers||{})
    }
  });

  // 429 = rate limited → exponential backoff
  if(r.status === 429){
    const backoff = Math.min(2000 * Math.pow(2, attempt), 32000); // 2s, 4s, 8s … 32s max
    const retryAfter = r.headers.get('Retry-After');
    const wait = retryAfter ? parseInt(retryAfter)*1000 : backoff;
    log(`⏳ Rate limited — waiting ${Math.round(wait/1000)}s before retry (attempt ${attempt+1})...`,'warn');
    updateRateLabel(`Rate limited — retrying in ${Math.round(wait/1000)}s...`);
    await sleep(wait);
    if(attempt < 6) return throttledFetch(url, opts, attempt+1);
    // Include the status code in the thrown error so callers can detect 429 reliably
    throw new Error('GMB 429: Rate limit persists after 6 retries. Please wait a minute and try again.');
  }

  // 503 / 500 → short retry
  if((r.status===503||r.status===500) && attempt < 3){
    await sleep(3000 * (attempt+1));
    return throttledFetch(url, opts, attempt+1);
  }

  if(!r.ok){const t=await r.text();throw new Error('GMB '+r.status+': '+t.slice(0,200));}
  return r.json();
}

async function gmb(url, opts={}){ return throttledFetch(url, opts); }

async function gmbUpload(url,bytes,mimeType){
  const now=Date.now();const gap=now-_lastGmbCall;
  if(gap<getThrottle())await sleep(getThrottle()-gap);
  _lastGmbCall=Date.now();
  const r=await fetch(url,{method:'POST',headers:{'Authorization':'Bearer '+gToken,'Content-Type':mimeType},body:bytes});
  if(!r.ok){const t=await r.text();throw new Error('Upload '+r.status+': '+t.slice(0,200));}
  return r.json();
}

function updateRateLabel(msg){
  const el=document.getElementById('q-sub');
  if(el) el.textContent=msg;
  const el2=document.getElementById('prog-label');
  if(el2) el2.textContent=msg;
}

async function loadLocations(){
  document.getElementById('run-btn').disabled=true;
  document.getElementById('opt-run-btn').disabled=true;
  document.getElementById('q-sub').textContent='Loading accounts...';
  locations=[];

  try{
    // Step 1 — Get accounts (single call)
    log('Fetching Google accounts...','info');
    const accts=await gmb('https://mybusinessaccountmanagement.googleapis.com/v1/accounts');
    let accountList=accts.accounts||[];
    log(`Found ${accountList.length} Google account(s)`,'info');

    // If there are multiple accounts, prompt the user to choose which account to use before proceeding.
    if(accountList.length > 1){
      // Build a readable list for the prompt
      const names = accountList.map((a,i)=>`${i+1}: ${a.accountName||a.name}`).join('\n');
      const choice = prompt(`Multiple Google accounts were found. Choose one to use by number (or Cancel to abort):\n\n${names}`);
      if(!choice){
        toast('Account selection cancelled','err');
        document.getElementById('q-sub').textContent='Account not selected';
        return;
      }
      const idx = parseInt(choice,10)-1;
      if(isNaN(idx) || idx<0 || idx>=accountList.length){
        toast('Invalid selection','err');
        document.getElementById('q-sub').textContent='Invalid account selection';
        return;
      }
      accountList = [accountList[idx]]; // narrow to chosen account
    }

    // Step 2 — Get locations per account (throttled, sequential)
    for(const a of accountList){
      document.getElementById('q-sub').textContent=`Loading locations from ${a.accountName||a.name}...`;
      try{
        let pageToken='';
        do{
          const url=`https://mybusinessbusinessinformation.googleapis.com/v1/${a.name}/locations?readMask=name,title,categories,phoneNumbers,websiteUri&pageSize=100`+(pageToken?`&pageToken=${pageToken}`:'');
          const ld=await gmb(url);
          for(const l of (ld.locations||[])){
            const aid=a.name.replace('accounts/',''), lid=l.name.split('/').pop();
            locations.push({
              rawName:l.name, title:l.title||l.name, acctId:aid, locId:lid,
              categories:(l.categories?.primaryCategory?.displayName)||'Business',
              phone:l.phoneNumbers?.primaryPhone||'', website:l.websiteUri||'',
              unreplied:0, done:false, error:null, optimized:false,
              reviews:[], keywords:[], profile:null
            });
          }
          pageToken=ld.nextPageToken||'';
        }while(pageToken);
      }catch(e){ log(`Could not load locations for ${a.name}: ${e.message}`,'warn'); }
    }

    document.getElementById('q-badge').textContent=locations.length;
    document.getElementById('q-sub').textContent=locations.length+' profiles loaded — counting reviews...';
    document.getElementById('s-locs').textContent='0/'+locations.length;
    document.getElementById('run-btn').disabled=false;
    document.getElementById('opt-run-btn').disabled=false;
    log(`✓ Loaded ${locations.length} GMB locations`,'info');
    renderQueue(); renderStudioLocList();

    // Step 3 — Count unreplied reviews SLOWLY (throttled) — non-blocking
    // We do this in background with generous delays so it doesn't 429
    countUnrepliedSlow();

  }catch(e){
    log('Load failed: '+e.message,'warn');
    toast('Load failed: '+e.message,'err');
    document.getElementById('q-sub').textContent='Error — click Reload to try again';
    document.getElementById('run-btn').disabled=false;
    document.getElementById('opt-run-btn').disabled=false;
  }
}

// Counts unreplied reviews in background — slowly and safely
async function countUnrepliedSlow(){
  let total=0;
  const BATCH=5; // process 5 locations, then pause
  for(let i=0; i<locations.length; i++){
    const l=locations[i];
    try{
      const rd=await gmb(`https://mybusiness.googleapis.com/v4/accounts/${l.acctId}/locations/${l.locId}/reviews?pageSize=10`);
      l.unreplied=(rd.reviews||[]).filter(r=>!r.reviewReply?.comment).length;
      total+=l.unreplied;
      document.getElementById('s-pending').textContent=total+'+';
      document.getElementById('q-sub').textContent=`Counting reviews... ${i+1}/${locations.length}`;
      renderQueue();
    }catch(e){
      // If we detect a 429 we pause and retry the same location after a short wait
      if(e.message && e.message.includes('429')){
        log(`Review count paused (rate limit) — resuming in 15s...`,'warn');
        await sleep(15000); // long pause on 429
        i--; continue; // retry this location
      }
      // Other errors are skipped quietly — will be counted properly during engine run
      log(`Skipping count for ${l.title}: ${e.message}`,'warn');
    }
    // Extra pause every batch
    if((i+1)%BATCH===0) await sleep(2000);
  }
  document.getElementById('s-pending').textContent=total;
  document.getElementById('q-sub').textContent=`${locations.length} profiles · ${total} unreplied reviews`;
  log(`✓ Review count complete: ${total} unreplied across ${locations.length} locations`,'success');
  renderQueue();
}
